name: Build SD Card Firmware
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc-arm-none-eabi
          pip3 install pyyaml
      
      - name: Build firmware (SD Card + GC0328 + OSD)
        run: |
          python3 build.py --chip bk7252 --sensor gc0328 --sdcard --osd
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "build/*.img"
