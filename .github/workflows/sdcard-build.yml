name: Build SD Card Firmware
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc-arm-none-eabi make
      
      - name: Build firmware
        run: |
          make -j$(nproc) TARGET=bk7252 SENSOR=gc0328 SD_CARD=1 ENABLE_OSD=1
      
      # 关键修改：先列出所有文件，确认路径
      - name: List build directory
        run: ls -laR build/
      
      # 改成通用路径，只要是.img文件都打包
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "**/*.img"
