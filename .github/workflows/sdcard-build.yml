name: Build SD Card Firmware
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip gcc-arm-none-eabi make
      
      - name: Build firmware
        run: |
          # 针对 SD 卡刷机 + GC0328 摄像头 + OSD 时间戳编译
          make -j$(nproc) TARGET=bk7252 SENSOR=gc0328 SD_CARD=1 ENABLE_OSD=1
      
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/bk7252/gc0328/*.img
